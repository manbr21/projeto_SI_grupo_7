<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação de Agentes Autônomos</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>

    <body>
    <div id="app">
      
      <aside id="sidebar">
        <h2>Controles</h2>
        
        <div class="control-group">
          <label for="algoSelect">Algoritmo de Busca:</label>
          <select id="algoSelect">
            <option value="DFS">Busca em Profundidade (DFS)</option>
            <option value="BFS">Busca em Largura (BFS)</option>
            <option value="GREEDY">Busca Gulosa</option>
            <option value="ASTAR">A* (A-Estrela)</option>
          </select>
        </div>

        <button id="btnPlayPause" class="action-btn">Pausar Simulação</button>
        <button id="btnRepetir" class="action-btn outline">Repetir (Mesmo Mapa)</button>
        <button id="btnNovoMapa" class="action-btn outline">Gerar Novo Mapa</button>
        
        <div class="stats">
          <p>Comida Coletada: <span id="foodScore">0</span></p>
        </div>
      </aside>

      <main id="canvas-container">
      </main>

    </div>
    
    <script src="target.js"></script>
    <script src="vehicle.js"></script>
    
    <script src="priorityQueue.js"></script>

    <script src="terrain.js"></script>
    <script src="dfs.js"></script>
    <script src="bfs.js"></script>
    <script src="bcu.js"></script>
    <script src="greedySearch.js"></script>
    <script src="environment.js"></script>
    
    <script src="sketch.js"></script>
  </body>
</html>
